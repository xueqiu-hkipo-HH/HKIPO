function sn(n){
  return (n||'')
    .replace(/股份有限公司$/,'').replace(/有限公司$/,'').replace(/集团有限公司$/,'')
    .replace(/\s*[（(][^）)]{1,6}[）)]\s*$/,'').trim();
}

function calcSi(co){
  const today=new Date();today.setHours(0,0,0,0);
  function toD(s){if(!s)return null;try{var d=new Date(s);d.setHours(0,0,0,0);return d;}catch(e){return null;}}
  var listD=toD(co.list),ipoD=toD(co.ipo),hearD=toD(co.hear);
  if(listD&&listD<=today)return 3;
  if(ipoD)return 2;
  if(hearD&&hearD<=today)return 1;
  return 0;
}

function fmtDt(d){
  if(!d||d==='—'||d==='待定'||d.includes('推迟'))return '';
  return d.replace(/^2026-/,'').replace(/^2025-/,'25/');
}

// 构建公司卡片（无时间轴，直接展示）
function buildCard(co,si){
  const div=document.createElement('div');
  div.className='card '+SC[si];
  const rows=[
    ['行业',co.ind||''],['核心业务',co.biz||''],['办公地',co.office||''],
    ['股票代码',(co.code&&co.code!=='待定')?co.code:''],
    ['招股日期',fmtDt(co.ipo||'')?co.ipo:''],
    ['上市日期',fmtDt(co.list||'')?co.list:''],
    ['递表日期',fmtDt(co.filed_date||'')?co.filed_date:''],
  ].filter(([,v])=>v&&v.trim());
  const kv=rows.map(([l,v])=>`<div class="kvitem"><div class="kvlbl">${l}</div><div class="kvval">${v}</div></div>`).join('');
  div.innerHTML=`
    <div class="card-head">
      <div><div class="card-name">${co.name||''}</div><div class="card-code">${co.code||''}</div></div>
      <div class="card-badge ${BC[si]}">${SL[si]}</div>
    </div>
    ${kv?`<div class="kvgrid">${kv}</div>`:'<div style="padding:4px 0;font-size:12px;color:#8098B0">暂无详细信息</div>'}`;
  return div;
}

  div.className='fcard';
  const rows=[
    ['行业',f.ind||''],['核心业务',f.biz||''],['办公地',f.office||''],
    ['递表日期',f.date||''],
  ].filter(([,v])=>v&&v.trim());
  const kv=rows.map(([l,v])=>`<div class="kvitem"><div class="kvlbl">${l}</div><div class="kvval">${v}</div></div>`).join('');
  div.innerHTML=`
    <div class="fcard-name">
      <span>${f.full||f.short||''}</span>
      <span class="fcard-badge">递表</span>
    </div>
    ${kv?`<div class="kvgrid">${kv}</div>`:''}`;
  return div;
}

// 打开弹窗 - 所有公司直接显示卡片，无需二次点击
function openSheet(title, evs, filed){
  document.getElementById('shdate').textContent=title;
  const body=document.getElementById('shbody');
  body.innerHTML='';
  // 招股/上市/聆讯公司直接显示卡片
  evs.forEach(({co,si})=>body.appendChild(buildCard(co,si)));
  // 递表公司也直接显示卡片，不是列表
  if(filed&&filed.length>0){
    if(evs.length>0){
      const div=document.createElement('div');
      div.style.cssText='font-size:11px;font-weight:800;color:#3A5070;margin:12px 0 6px;';
      div.textContent=`📋 今日新递表（${filed.length}家）`;
      body.appendChild(div);
    }
    filed.forEach(f=>body.appendChild(buildFiledCard(f)));
  }
  document.getElementById('overlay').classList.add('show');
  document.getElementById('sheet').scrollTop=0;
}

// 日历事件
function getDayEvs(m,d){
  const ds=`2026-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const evs=[];
  ZS.forEach(co=>{if((co.list||'')===ds)evs.push({co,si:3});});
  ZS.forEach(co=>{if((co.ipo||'')===ds&&!evs.find(e=>e.co===co))evs.push({co,si:2});});
  LX.forEach(co=>{if((co.hear||'')===ds)evs.push({co,si:1});});
  return evs;
}
function getDayFiled(m,d){return FILED[`${m}-${d}`]||[];}

// 构建日历
function buildCal(m){
  const cfg=MCONF[m];
  const grid=document.getElementById('calgrid');
  grid.innerHTML='';
  for(let i=0;i<cfg.s;i++){const e=document.createElement('div');e.className='dc emp';grid.appendChild(e);}
  for(let d=1;d<=cfg.days;d++){
    const dow=(cfg.s+d-1)%7;
    const evs=getDayEvs(m,d),filed=getDayFiled(m,d);
    const hasAny=evs.length>0||filed.length>0;
    const isWk=dow===0||dow===6;
    const isPast=m<TM||(m===TM&&d<TD);
    const isToday=m===TM&&d===TD;
    const cell=document.createElement('div');
    const cls=['dc'];
    if(isWk)cls.push('wke');if(isPast)cls.push('pst');
    if(isToday)cls.push('tod');if(hasAny)cls.push('hasev');
    cell.className=cls.join(' ');
    const dn=document.createElement('div');
    dn.className='dnum'+(isToday?' tod':'');
    dn.innerHTML=d;
    cell.appendChild(dn);
    const MAX_CHIPS=6;
    let shown=0;
    evs.forEach(({co,si})=>{
      if(shown>=MAX_CHIPS)return;
      const c=document.createElement('div');c.className='chip '+CC[si];
      c.innerHTML=`<span class="cname">${sn(co.name)}</span><span class="ctag">${SL[si]}</span>`;
      cell.appendChild(c);shown++;
    });
    filed.forEach(f=>{
      if(shown>=MAX_CHIPS)return;
      const c=document.createElement('div');c.className='chip c0';
      c.innerHTML=`<span class="cname">${f.short}</span><span class="ctag">递表</span>`;
      cell.appendChild(c);shown++;
    });
    const total=evs.length+filed.length;
    if(total>shown){const mo=document.createElement('div');mo.className='more';mo.textContent=`+${total-shown}`;cell.appendChild(mo);}
    if(hasAny){
      const dm=m,dd=d;
      cell.addEventListener('click',()=>openSheet(
        `2026年${dm}月${dd}日（周${DW[(cfg.s+dd-1)%7]}）`,
        getDayEvs(dm,dd),getDayFiled(dm,dd)
      ));
    }
    grid.appendChild(cell);
  }
  const rem=(7-(cfg.s+cfg.days)%7)%7;
  for(let i=0;i<rem;i++){const e=document.createElement('div');e.className='dc emp';grid.appendChild(e);}
}

// 关闭弹窗
function closeModal(){document.getElementById('overlay').classList.remove('show');}
document.getElementById('closebtn').addEventListener('click',closeModal);
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

// 汇总面板
function buildSummary(){
  const today=new Date();today.setHours(0,0,0,0);
  function toD(s){if(!s)return null;try{var d=new Date(s);d.setHours(0,0,0,0);return d;}catch(e){return null;}}

  // 各阶段严格互斥
  var listed=[],subbing=[],heard=[];
  ZS.forEach(function(co){
    var listD=toD(co.list),ipoD=toD(co.ipo);
    if(listD&&listD<=today)listed.push({co:co,si:3});
    else subbing.push({co:co,si:2});
  });
  var zsNames=new Set(ZS.map(function(c){return c.name;}));
  LX.forEach(function(co){
    if(!zsNames.has(co.name))heard.push({co:co,si:1});
  });
  var allFiled=Object.values(FILED).flat().sort(function(a,b){return b.date.localeCompare(a.date);});

  listed.sort(function(a,b){return (b.co.list||'').localeCompare(a.co.list||'');});
  subbing.sort(function(a,b){return (b.co.ipo||'').localeCompare(a.co.ipo||'');});
  heard.sort(function(a,b){return (b.co.hear||'').localeCompare(a.co.hear||'');});

  var sections=[
    {label:'递表',si:0,rows:allFiled,type:'filed'},
    {label:'通过聆讯',si:1,rows:heard,type:'zs'},
    {label:'招股',si:2,rows:subbing,type:'zs'},
    {label:'上市',si:3,rows:listed,type:'zs'},
  ];

  var badges=document.getElementById('sumBadges');
  badges.innerHTML='';
  sections.forEach(function(s){
    if(s.rows.length===0)return;
    var b=document.createElement('span');b.className='sbadge';
    b.style.background=COLORS[s.si];
    b.textContent=s.label+' '+s.rows.length;badges.appendChild(b);
  });

  var body=document.getElementById('sumBody');
  body.innerHTML='';
  sections.forEach(function(sec,gi){
    if(sec.rows.length===0)return;
    var sg=document.createElement('div');sg.className='sg';
    var hd=document.createElement('div');hd.className='sg-hd';
    hd.innerHTML='<div class="sg-dot" style="background:'+COLORS[sec.si]+'"></div>'
      +'<span class="sg-label">'+sec.label+'</span>'
      +'<span class="sg-count" style="background:'+COLORS[sec.si]+'">'+sec.rows.length+'</span>'
      +'<span class="sg-arrow" id="sga'+gi+'">▼</span>';
    var list=document.createElement('div');list.className='sg-list';list.id='sgl'+gi;

    sec.rows.forEach(function(item){
      var el=document.createElement('div');el.className='sg-item';
      var name,date,co,csi;
      if(sec.type==='filed'){
        name=sn(item.full||item.short||'');date=item.date||'';
        co={name:item.full||item.short,code:'',filed_date:item.date,ipo:'',list:'',hear:'',ind:item.ind||'',biz:item.biz||'',office:item.office||''};
        csi=0;
      } else {
        co=item.co;csi=item.si;name=sn(co.name);
        var dk=csi===3?'list':csi===2?'ipo':csi===1?'hear':'filed_date';
        date=co[dk]||'';
      }
      el.innerHTML='<span class="sg-item-name">'+name+'</span><span class="sg-item-date">'+(fmtDt(date)||date.slice(5)||'')+'</span>';
      (function(co,csi){
        el.addEventListener('click',function(){
          document.getElementById('shdate').textContent=co.name||name;
          var b=document.getElementById('shbody');b.innerHTML='';
          b.appendChild(buildCard(co,csi));
          document.getElementById('overlay').classList.add('show');
          document.getElementById('sheet').scrollTop=0;
        });
      })(co,csi);
      list.appendChild(el);
    });

    hd.addEventListener('click',function(){
      var isOpen=list.classList.toggle('show');
      document.getElementById('sga'+gi).textContent=isOpen?'▲':'▼';
    });
    sg.appendChild(hd);sg.appendChild(list);body.appendChild(sg);
  });
}

document.getElementById('sumToggle').addEventListener('click',()=>{
  const body=document.getElementById('sumBody');
  const isOpen=body.classList.toggle('show');
  document.getElementById('sumArrow').textContent=isOpen?'▲':'▼';
});

(function(){
  var SC=COLORS, SL2=['递表','通过聆讯','招股','上市'];
  var IDX=null;
  function buildIdx(){
    var idx=[];
    ZS.forEach(function(co){idx.push({name:co.name,code:co.code||'',ind:co.ind||'',si:calcSi(co),co:co});});
    LX.forEach(function(co){if(!new Set(ZS.map(function(c){return c.name;})).has(co.name))idx.push({name:co.name,code:'',ind:co.ind||'',si:1,co:co});});
    Object.values(FILED).flat().forEach(function(f){
      var co={name:f.full||f.short,code:'',filed_date:f.date,ipo:'',list:'',hear:'',ind:f.ind||'',biz:f.biz||'',office:f.office||''};
      idx.push({name:f.full||f.short,short:f.short,code:'',ind:f.ind||'',si:0,co:co});
    });
    return idx;
  }
  function search(q){
    if(!IDX)IDX=buildIdx();
    q=q.trim();
    var list=document.getElementById('searchList');
    var empty=document.getElementById('searchEmpty');
    Array.from(list.children).forEach(function(c){if(c!==empty)c.remove();});
    if(!q){empty.style.display='none';return;}
    var res=IDX.filter(function(i){return i.name.includes(q)||(i.short||'').includes(q)||(i.code||'').includes(q)||(i.ind||'').includes(q);}).slice(0,30);
    if(res.length===0){empty.style.display='block';}
    else{
      empty.style.display='none';
      res.forEach(function(item){
        var el=document.createElement('div');el.className='sri';
        el.innerHTML='<div class="sri-dot" style="background:'+SC[item.si]+'"></div>'
          +'<div class="sri-info"><div class="sri-name">'+item.name+'</div>'
          +'<div class="sri-sub">'+item.ind+(item.code?' · '+item.code:'')+'</div></div>'
          +'<div class="sri-badge" style="background:'+SC[item.si]+'">'+SL2[item.si]+'</div>';
        (function(co,si){el.addEventListener('click',function(){
          closeSearch();
          document.getElementById('shdate').textContent=co.name;
          var b=document.getElementById('shbody');b.innerHTML='';
          b.appendChild(buildCard(co,si));
          document.getElementById('overlay').classList.add('show');
          document.getElementById('sheet').scrollTop=0;
        });})(item.co,item.si);
        list.appendChild(el);
      });
    }
  }
  function openSearch(){document.getElementById('searchBox').classList.add('show');setTimeout(function(){document.getElementById('searchBoxInput').focus();},100);}
  function closeSearch(){
    document.getElementById('searchBox').classList.remove('show');
    document.getElementById('searchBoxInput').value='';
    var list=document.getElementById('searchList');
    var empty=document.getElementById('searchEmpty');
    Array.from(list.children).forEach(function(c){if(c!==empty)c.remove();});
    empty.style.display='none';
  }
  document.getElementById('searchInput').addEventListener('click',openSearch);
  document.getElementById('searchCancel').addEventListener('click',closeSearch);
  document.getElementById('searchBoxInput').addEventListener('input',function(){search(this.value);});
})();
</script>
