const MCONF={1:{s:3,days:31},2:{s:0,days:28},3:{s:0,days:31},4:{s:3,days:30}};
const TM=3,TD=27;
const DW=['日','一','二','三','四','五','六'];
const SL=['递表','通过聆讯','招股','上市'];
const CC=['c0','c1','c2','c3'];
const SC=['s0','s1','s2','s3'];

const TC=['st0','st1','st2','st3'];
const COLORS=['#3A80D0','#7040C8','#C88000','#D01020'];

function sn(n){
  return (n||'')
    .replace(/股份有限公司$/,'').replace(/有限公司$/,'').replace(/集团有限公司$/,'')
    .replace(/\s*[（(][^）)]{1,5}[）)]\s*$/,'').trim();
}

function calcSi(co){
  const today=new Date('2026-03-27');
  if((co.list||'')&&co.list!=='待定'&&co.list!=='—'&&!(co.list||'').includes('推迟')){
    try{if(new Date(co.list)<=today)return 3;}catch(e){}
  }
  if(co.hear&&co.hear!=='待定'&&co.hear!=='—'){
    try{if(new Date(co.hear)<=today)return co.ipo?2:1;}catch(e){}
  }
  if(co.ipo&&co.ipo!=='待定'&&co.ipo!=='—') return 2;
  return 1;
}

function fmtDt(d){
  if(!d||d==='—'||d==='待定'||d.includes('推迟'))return '';
  return d.replace(/^2026-/,'').replace(/^2025-/,'25/');
}

// 构建公司卡片（无时间轴）
function buildCard(co, si){
  const div=document.createElement('div');
  div.className='card '+SC[si];
  const rows=[
    ['行业',    co.ind||''],
    ['核心业务', co.biz||''],
    ['办公地',  co.office||''],
    ['股票代码', (co.code&&co.code!=='待定')?co.code:''],
    ['招股日期', fmtDt(co.ipo||'')?co.ipo:''],
    ['上市日期', fmtDt(co.list||'')?co.list:''],
    ['递表日期', fmtDt(co.filed_date||'')?co.filed_date:''],
  ].filter(([,v])=>v&&v.trim());
  const kv=rows.map(([l,v])=>`<div class="kvitem"><div class="kvlbl">${l}</div><div class="kvval">${v}</div></div>`).join('');
  div.innerHTML=`
    <div class="card-head">
      <div><div class="card-name">${co.name||''}</div><div class="card-code">${co.code||''}</div></div>
      <div class="card-badge ${BC[si]}">${SL[si]}</div>
    </div>
    ${kv?`<div class="kvgrid">${kv}</div>`:'<div style="padding:8px 0;font-size:12px;color:#8098B0">暂无详细信息</div>'}`;
  return div;
}

// 打开弹窗
function showSheet(title, evs, filed){
  const body=document.getElementById('shbody');
  body.innerHTML='';
  document.getElementById('shdate').textContent=title;
  evs.forEach(({co,si})=>body.appendChild(buildCard(co,si)));
  if(filed&&filed.length>0){
    const fw=document.createElement('div');fw.className='fwrap';
    fw.innerHTML=`<div class="fhd">📋 今日新递表（${filed.length}家）</div>`
      +filed.map((f,i)=>`<div class="fitem" data-fi="${i}"><div class="fdot"></div><span>${f.full}</span><span class="fdate">${f.date}</span></div>`).join('');
    fw.querySelectorAll('.fitem').forEach((el,i)=>{
      el.addEventListener('click',()=>{
        const f=filed[i];
        const co={name:f.full,code:'',filed_date:f.date,ipo:'',list:'',hear:'',ind:f.ind||'',biz:f.biz||'',office:f.office||''};
        body.innerHTML='';
        document.getElementById('shdate').textContent=sn(f.full);
        const back=document.createElement('button');back.className='backbtn';
        back.textContent='← 返回'+title;
        back.addEventListener('click',()=>showSheet(title,evs,filed));
        body.appendChild(back);
        body.appendChild(buildCard(co,0));
        document.getElementById('sheet').scrollTop=0;
      });
    });
    body.appendChild(fw);
  }
  document.getElementById('overlay').classList.add('show');
  document.getElementById('sheet').scrollTop=0;
}

// 日历事件
function getDayEvs(m,d){
  const ds=`2026-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
  const evs=[];
  ZS.forEach(co=>{if((co.list||'')===ds)evs.push({co,si:3});});
  ZS.forEach(co=>{if((co.ipo||'')===ds&&!evs.find(e=>e.co===co))evs.push({co,si:calcSi(co)});});
  LX.forEach(co=>{if((co.hear||'')===ds)evs.push({co,si:calcSi(co)});});
  return evs;
}
function getDayFiled(m,d){return FILED[`${m}-${d}`]||[];}

// 构建日历
function buildCal(m){
  const cfg=MCONF[m];
  const grid=document.getElementById('calgrid');
  grid.innerHTML='';
  for(let i=0;i<cfg.s;i++){const e=document.createElement('div');e.className='dc emp';grid.appendChild(e);}
  for(let d=1;d<=cfg.days;d++){
    const dow=(cfg.s+d-1)%7;
    const evs=getDayEvs(m,d),filed=getDayFiled(m,d);
    const hasAny=evs.length>0||filed.length>0;
    const cell=document.createElement('div');
    const cls=['dc'];
    if(dow===0||dow===6)cls.push('wke');
    if(m<TM||(m===TM&&d<TD))cls.push('pst');
    if(m===TM&&d===TD)cls.push('tod');
    if(hasAny)cls.push('hasev');
    cell.className=cls.join(' ');
    const dn=document.createElement('div');
    dn.className='dnum'+(m===TM&&d===TD?' tod':'');
    dn.innerHTML=d+(m===TM&&d===TD?'<span class="todtag">今</span>':'');
    cell.appendChild(dn);
    evs.slice(0,3).forEach(({co,si})=>{
      const c=document.createElement('div');c.className='chip '+CC[si];
      c.innerHTML=`<span class="cname">${sn(co.name)}</span><span class="ctag">${SL[si]}</span>`;
      cell.appendChild(c);
    });
    const slots=Math.max(0,3-evs.length);
    filed.slice(0,slots).forEach(f=>{
      const c=document.createElement('div');c.className='chip c0';
      c.innerHTML=`<span class="cname">${f.short}</span><span class="ctag">递表</span>`;
      cell.appendChild(c);
    });
    const total=evs.length+filed.length;
    const shown=Math.min(evs.length,3)+Math.min(slots,filed.length);
    if(total>shown){const mo=document.createElement('div');mo.className='more';mo.textContent=`+${total-shown}`;cell.appendChild(mo);}
    if(hasAny){
      const dm=m,dd=d;
      cell.addEventListener('click',()=>showSheet(
        `2026年${dm}月${dd}日（周${DW[(cfg.s+dd-1)%7]}）`,
        getDayEvs(dm,dd),getDayFiled(dm,dd)
      ));
    }
    grid.appendChild(cell);
  }
  const rem=(7-(cfg.s+cfg.days)%7)%7;
  for(let i=0;i<rem;i++){const e=document.createElement('div');e.className='dc emp';grid.appendChild(e);}
}

  // 按阶段分组
  const groups=[
    {si:3, label:'已上市', items:[], dateKey:'list'},
    {si:2, label:'招股中', items:[], dateKey:'ipo'},
    {si:1, label:'通过聆讯', items:[], dateKey:'hear'},
    {si:0, label:'递表中', items:[], dateKey:'date'},
  ];
  ZS.forEach(co=>{
    const si=calcSi(co);
    const g=groups.find(g=>g.si===si);
    if(g) g.items.push({co,si,dateKey:g.dateKey});
  });
  LX.forEach(co=>{
    const si=calcSi(co);
    if(si===1){
      groups[2].items.push({co,si,dateKey:'hear'});
    }
  });
  // 递表（按最近日期取前30）
  const allFiled=Object.values(FILED).flat()
    .sort((a,b)=>b.date.localeCompare(a.date));
  groups[3].items=allFiled.slice(0,200).map(f=>({
    co:{name:f.full,code:'',filed_date:f.date,ipo:'',list:'',hear:'',ind:f.ind||'',biz:f.biz||'',office:f.office||''},
    si:0, date:f.date
  }));

  // 顶部徽章
  const badges=document.getElementById('sumBadges');
  badges.innerHTML='';
  [groups[0],groups[1],groups[2]].forEach(g=>{
    if(g.items.length>0){
      const b=document.createElement('span');
      b.className='sbadge sb'+g.si;
      b.textContent=`${SL[g.si]} ${g.items.length}家`;
      badges.appendChild(b);
    }
  });
  // 递表单独加
  const totalFiled=Object.values(FILED).flat().length;
  const bf=document.createElement('span');bf.className='sbadge sb0';
  bf.textContent=`递表 ${totalFiled}家`;badges.appendChild(bf);

  // 构建body
  const body=document.getElementById('sumBody');
  body.innerHTML='';
  const counts=[groups[0].items.length,groups[1].items.length,groups[2].items.length,totalFiled];

  groups.forEach((g,gi)=>{
    const cnt=gi===3?totalFiled:g.items.length;
    if(cnt===0)return;
    const sg=document.createElement('div');sg.className='sg';
    const hd=document.createElement('div');hd.className='sg-hd';
    hd.innerHTML=`<div class="sg-dot" style="background:${COLORS[g.si]}"></div>
      <span class="sg-label">${SL[g.si]}</span>
      <span class="sg-count" style="background:${COLORS[g.si]}">${cnt}</span>
      <span class="sg-arrow" id="sga${gi}">▼</span>`;
    const list=document.createElement('div');list.className='sg-list';list.id=`sgl${gi}`;

    // 填充列表
    const itemsToShow = gi===3 ? Object.values(FILED).flat().sort((a,b)=>b.date.localeCompare(a.date)) : g.items;
    itemsToShow.forEach(item=>{
      const el=document.createElement('div');el.className='sg-item';
      let name,date,co,si;
      if(gi===3){
        name=sn(item.full||'');
        date=item.date||'';
        co={name:item.full,code:'',filed_date:item.date,ipo:'',list:'',hear:'',ind:item.ind||'',biz:item.biz||'',office:item.office||''};
        si=0;
      } else {
        name=sn(item.co.name);
        const dk=item.dateKey;
        date=item.co[dk]||item.co.list||item.co.ipo||item.co.hear||'';
        co=item.co; si=item.si;
      }
      const shortDate=fmtDt(date)||date.slice(5)||'';
      el.innerHTML=`<span class="sg-item-name">${name}</span><span class="sg-item-date">${shortDate}</span>`;
      el.addEventListener('click',()=>{
        document.getElementById('shdate').textContent=co.name||name;
        const b=document.getElementById('shbody');b.innerHTML='';
        b.appendChild(buildCard(co,si));
        document.getElementById('overlay').classList.add('show');
        document.getElementById('sheet').scrollTop=0;
      });
      list.appendChild(el);
    });

    hd.addEventListener('click',()=>{
      const isOpen=list.classList.toggle('show');
      document.getElementById('sga'+gi).classList.toggle('open',isOpen);
    });
    sg.appendChild(hd);sg.appendChild(list);body.appendChild(sg);
  });
}

// 关闭弹窗
function closeModal(){document.getElementById('overlay').classList.remove('show');}
document.getElementById('closebtn').addEventListener('click',closeModal);
document.getElementById('overlay').addEventListener('click',function(e){if(e.target===this)closeModal();});

// 汇总折叠
document.getElementById('sumToggle').addEventListener('click',()=>{
  const body=document.getElementById('sumBody');
  const arrow=document.getElementById('sumArrow');
  const isOpen=body.classList.toggle('show');
  arrow.classList.toggle('open',isOpen);
});

ZS.forEach(co=>{IDX.push({name:co.name,short:sn(co.name),code:co.code||'',si:calcSi(co),sub:`${co.ipo||''} 招股 · ${co.list||''} 上市`,co});});
LX.forEach(co=>{IDX.push({name:co.name,short:sn(co.name),code:'',si:calcSi(co),sub:`${co.hear||''} 通过聆讯`,co:{...co,ipo:'待定',list:'待定'}});});
Object.values(FILED).flat().forEach(f=>{IDX.push({name:f.full,short:f.short,code:'',si:0,sub:`${f.date} 递表`,co:{name:f.full,code:'',filed_date:f.date,ipo:'',list:'',hear:'',ind:f.ind||'',biz:f.biz||'',office:f.office||''}});});

document.addEventListener('click',e=>{if(!e.target.closest('#swrap'))slist.style.display='none';});

document.querySelectorAll('.mtab').forEach(btn=>{
  btn.addEventListener('click',function(){
    document.querySelectorAll('.mtab').forEach(b=>b.classList.remove('on'));
    this.classList.add('on');buildCal(parseInt(this.dataset.m));
  });
});

buildCal(3);
buildSummary();
